      JAXA（宇宙航空研究開発機構）は日本時間2026年6月12日に「H3」ロケット6号機の打ち上げを実施しました。JAXAは公式ライブ配信にて、メインミッションとなるロケット2段目の軌道投入達成を発表しています。

      打ち上げに関する情報は以下の通りです。

      打ち上げ情報：H3ロケット6号機
      ロケット：H3ロケット（H3-30S）
      打ち上げ日時：日本時間 2026年6月12日9時53分59秒
      発射場：種子島宇宙センター大型ロケット発射場（日本）
      ペイロード：性能確認用ペイロード（VEP-5）、小型副衛星6機
      H3ロケット6号機について
      H3ロケット6号機は、1段目のエンジンを2基から3基へ増やすかわりに固体燃料ロケットブースターを搭載しない、「H3-30S」（30形態）と呼ばれる形態の試験機です。H3の各形態のなかでも30形態は打ち上げコストが最も低く、衛星をより安価に軌道へ投入できるようになると期待されています。

      ペイロードには性能確認用ペイロード（VEP-5）の他に、以下6機の小型副衛星が搭載されました。

      ・東京科学大学「うみつばめ（PETREL）」
      ・静岡大学「しらいと（STARS-X）」
      ・Unseenlabs社「BRO-22」
      ・九州工業大学ほか「VERTECS」
      ・BULL社「HORN-L」「HORN-R」

      また、H3ロケット6号機は2025年12月の8号機の打ち上げ失敗以来、半年ぶりのH3ロケット飛行再開でもあります。原因究明を進めたJAXAは、ロケット2段目に衛星を搭載するための部品のひとつである衛星搭載アダプタに、製造の段階で部材の剥がれが生じて強度が低下した結果、打ち上げ中に2段目から衛星が脱落した可能性が極めて高いと特定しています。

      JAXAは、今後打ち上げられる機体については当面、衛星搭載アダプタの製造方法を変更する方針を示しています。一方で、6号機については荷重が低いことから、製造済みの衛星搭載アダプタを補修した上で使用されました。8号機打ち上げ失敗の原因究明評価を裏付けることと、将来のミッションの確実性を高めるために、6号機にはフェアリング分離時の衝撃を確認するための高周波用加速度センサーなどが追加搭載されるとともに、フェアリング内のカメラ映像の収録時間も延長されました。

      日本時間2026年6月12日9時53分59秒に打ち上げられたH3ロケット6号機は、リフトオフ3分32秒後（速報値、以下同様）に1段目と2段目を分離。リフトオフ15分3秒後には2段目エンジンの第1回燃焼を停止して、2段目機体が所定の軌道に入りました。

      その後は、リフトオフ16分4秒後の「うみつばめ（PETREL）」と「しらいと（STARS-X）」の分離確認に続き、他の4機の小型副衛星についても分離信号送出が確認されています。さらに、地球一周後の2段目を減速させ、予定海域へ制御落下できたことも確認されたということです。

      【最終更新：2026年6月12日13時45分】打上げ経過記者会見の内容を反映して記事本文を更新しました。

