    text: |
      約30年ぶり、令和の時代に即した新提案

      電気設備の観点から、住まいづくりの新スタンダードを提案「でんきの設備でeくらし」を開始
      居室には「四隅配置」、リビングダイニングに「コンセント31口以上※1」

      くらし
      電設資材
      パナソニック株式会社 エレクトリックワークス社（以下、当社）は、2025年11月11日「配線器具の日」に合わせ、電気設備の観点から、住まいづくりの新たなスタンダードを提案する活動「でんきの設備でeくらし」（以下、本活動）を開始します。
      本活動は、令和の時代に即した電気設備プランのスタンダードを普及し、建てた後で後悔しない住まいづくりをサポートするためのものです。

      昨今、住まいでの過ごし方の変化や、家庭で使用する電気機器の増加などにより、住まいのコンセントが不足しています。当社とルームクリップ株式会社の調査によると、家庭内のコンセントの位置、もしくは数に対して、約75％が不満を持っていることが分かりました。（※2）その他にも、住まいづくりにおいて、通信環境を整備することや防災・防犯機能を充実させることがますます重要になっています。
      家を建てた後に電気設備を増設するには工事を伴うため、コストと手間を抑えるためにも新築時から先読みして電気設備を計画することがおすすめです。

      当社は、製品の製造・販売だけではなく、より快適な住まいづくりをサポートするため、これまでも昭和30年代の「適正配線運動」、40年代の「電気の1・2・3運動」として「1部屋2あかり3コンセント」提案をはじめ、昭和から平成を通して「時代に即した電気設備のご提案」にも注力してきました。

      今回、昨今の社会の変化を踏まえて、約30年ぶりに、住まいづくりの電気設備プランを提案します。そして、本活動の一環として、住宅会社と施主が満足いく住まいづくりに役立ててもらうため、当社の提案内容をまとめた「電気設備の教科書」を配布します。また、施主が自ら情報を取得できるよう、ウェブページも開設します。

      当社は本活動を電気工事業界とともに推進し、2030年までに新たなスタンダードの普及・定着を目指します。
      さらに今後は、照明器具や空調設備などの製品も含め、提案の幅を広げていきます。

      ＜配線計画 主な3ポイント＞
      1.【基本法則】居室には「四隅配置」＋「くらしに合わせたアドオン」を
      2. リビングダイニングには、家族それぞれが過ごす場所に合わせて配置（推奨：31口以上（※1））
      3. キッチンには、調理家電の数に合わせて配置（推奨：20口以上（※1））
      ※1 コンセント設置個数と設置イメージは下記の想定に基づいています。
      【家族構成】家族4人（夫・妻：共働き、子ども2人：就学中）【部屋の大きさ】リビング・ダイニング・小上がり：約33.1 m2、キッチン：約6.6 m2

      ※2 コンセントに関するアンケート（2025年4月15日～23日実施）n=1,167名（RoomClipユーザー）

      【お問い合わせ先】
      でんきの設備でeくらし ウェブサイトURL
      https://www2.panasonic.biz/jp/densetsu/e-kurashi/

      【コンセント設置の主なポイント】
      1.【基本法則】居室には「四隅配置」＋「くらしに合わせたアドオン」を
      画像：【基本法則】居室には「四隅配置」＋「くらしに合わせたアドオン」を1
      現在の住まいづくりの主流である、コンセントを部屋の二隅に設置する「二隅配置」では、家電や家具が増えることにより、使いにくくなるケースもあります。
      そこで、当社は「四隅配置」と「くらしに合わせたアドオン」を居室における基本原則として推奨します。（非居室には二隅配置）
      「四隅配置」では、すべてのコンセントが家具などで隠れてしまうことを減らすために、ベースの数にゆとりをもたらします。延長コードをなるべく使わず、コンセント不足やタコ足配線の問題に備えられます。
      また、「くらしに合わせたアドオン」として、使用する家電やくらし方に合わせて、使いやすい位置にコンセントを補うことも重要です。さらに、後悔のないコンセント設計のためには、高さへの配慮も重要です。

      画像：【基本法則】居室には「四隅配置」＋「くらしに合わせたアドオン」を2
      2. リビングダイニングには、家族それぞれが過ごす場所に合わせて配置（推奨：31口以上（※1））
      画像：リビングダイニングには、家族それぞれが過ごす場所に合わせて配置（推奨：31口以上）
      家族が同じ空間にいながら、別々の過ごし方をすることも多いリビングでは、それぞれが自分の居場所で好きなことをできるように、想定される居場所の近くにコンセントを設置することがおすすめです。
      例えば、家族全員がスマホを操作するそれぞれの居場所にコンセントがあると便利です。
      その他、テレビや季節家電、掃除機など使う家電が多いリビングダイニングには、コンセント31口以上が推奨です。（※2）

      3. キッチンには、調理家電の数に合わせて配置（推奨：20口以上（※1））
      画像：キッチンには、調理家電の数に合わせて配置（推奨：20口以上）
      キッチンでは、調理家電が増えて、コンセントのお悩みも増加しています。
      使う家電にすぐに手が届くように、動線や収納も考慮して、コンセントを設置することがおすすめです。
      また、使い勝手や安全性に配慮して、隠れない場所・高さにしておくことも大切です。
      さらに、調理家電は容量が大きくなりがちなので、回路を分散することも重要です。
      調理家電の数が増えているキッチンには、コンセント20口以上が推奨です。（※2）

      【調査結果】
      当社とルームクリップ株式会社は、コンセントの不満や要望について調査を実施しました。（※2）

      画像：【調査結果】コンセントに関する不満
      施主の75.4％がコンセントの位置、もしくは数に不満を持っていることが明らかになりました。
      （68.2％が位置に、37.2％が数に不満があると回答しています。）＜n=1,167＞
      画像：【調査結果】位置に関する悩みが出やすい空間の順位
      位置に関する悩みが出やすい空間として、
      1位リビング（61.7％）、2位キッチン（50.3％）、3位寝室（28.6％）が上位に挙がっています。＜n=797＞
      画像：【調査結果】位置に関する悩みの具体例
      位置に関する悩みの具体例として、
      1位「家具などで隠れてしまうこと」（57.8％）、2位「季節家電を好みの場所に置けないこと」（47.1％）が上位に挙がっています。＜n=797＞
      【建築家 寳神 尚史氏コメント】
      画像：建築家 寳神 尚史氏顔写真、プロフィール
      〇建築家にとっての電気設備とは

      電気設備は、住まいになくてはならない存在です。一方で、空間のノイズにもなることもあります。まさに、不便でないことと邪魔でないこととが求められる存在で、そのバランスの舵取りが建築家に求められています。

      〇現代の住まいづくりと住環境の変化について

      今回の取り組みで、家電や電子機器が増えているのに対し、コンセントが不足しがちな現状など、必要な電気設備のニーズと住まいのギャップが大きくなってきていることを再認識しました。そこで、建築家としても電気設備に関するベーシックを格上げしなくてはならないと思いました。また、通信環境や、EV充電、防災・防犯対策などの、今後を見据えた時に大きな話題になりそうなことも、抑えておくべきだと感じています。

      〇今回の提案を現場ではどう活かせるか

      パナソニックが新たに提案する「四隅の法則＋アドオン」を取り入れ、新築時の配線計画に役立つ虎の巻のイメージで制作しました。おそらく、我々建築家にとってもすごく記憶に残る使いやすいレシピになると思います。この読本を活用し、後悔しない家づくりを実現してもらいたいです。

      記事の内容は発表時のものです。
      商品の販売終了や、組織の変更などにより、最新の情報と異なる場合がありますので、ご了承ください。

