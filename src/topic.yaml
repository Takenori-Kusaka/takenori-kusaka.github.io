      クック氏、WWDCで最後の舞台――Gemini搭載Siriで起死回生なるか、アップルAIは「遅刻」の汚名を返上できるか
      2026-06-06 19:26 (GMT+9)
      Google の優先する情報源に追加
      アップルの2026年WWDCが間もなく開幕する。これはティム・クック氏がCEOとして指揮を執る最後の開発者会議であり、同社にとってAI分野での重要な「追試」となる。最大の焦点はSiriの抜本的な再構築だ。新SiriはグーグルのGeminiモデルを基盤とし、独立したアプリ、ダイナミックアイランドとの深い統合、アプリを横断した複数ステップの指示実行といった能力を備え、アップルがクローズドな自社開発からオープンな協業へと舵を切ったことを示す。iOS 27などのシステムアップデートでは、サードパーティの大規模言語モデルの自由な切り替え、AIによる画像拡張、折りたたみ端末への対応といった機能も導入される。ウォール街は今回のWWDCに大きな期待を寄せ、アップルがAI時代の「料金所」になり得ると見る向きがある一方、新Siriの「ベータ版」という位置づけやハードウェア面でのサプライズ不足が株価の短期的な押し上げ要因にはならないとの懸念も出ている。クック氏が退任前にアップルのAI戦略に一定の成果を示せるか、正念場を迎える。
      重要要素
      クック氏、WWDCで最後の舞台――Gemini搭載Siriで起死回生なるか、アップルAIは「遅刻」の汚名を返上できるか
      日本時間6月9日未明、アップルの2026年世界開発者会議（WWDC26）が正式に開幕する。これはティム・クック（Tim Cook）氏がアップルのCEOとして指揮を執る最後のWWDCであると同時に、人工知能（AI）競争における同社の、遅ればせながらの「背水の陣」でもある。

      2年前、アップルはWWDCで「アップルインテリジェンス（Apple Intelligence）」という大きな構想を華々しく打ち上げたが、結果として技術は期待に届かず、製品のリリースは相次いで延期された。現在、株価は過去最高値近辺にあり、時価総額は4.6兆ドル（約736兆円）に達する中、クック氏と彼のチームは同じ舞台で、AIに関する新たな解答を提示しなければならない。

      今回のWWDCの中核は、全面的に再構築される音声アシスタント「Siri」であることは間違いない。ブルームバーグの著名アナリスト、マーク・ガーマン（Mark Gurman）氏などの複数の情報によると、新Siriの内部コードネームは「Campo」で、単なる受動的な音声コマンドツールから、常時稼働する「AIパートナー」へと変貌を遂げるという。

      Siriの歴史的再構築：「人工無能」からシステムレベルのAIオーケストレーターへ

      新Siriの最も直感的な変化は、ついにiPhone内に専用の「居場所」を得たことだ。アップルはSiriを、2022年に初めて導入された「ダイナミックアイランド（Dynamic Island）」に深く統合した。ユーザーが「Siri」と呼びかけるか、電源ボタンを長押しすると、ダイナミックアイランドが展開し、新しいダークカラーのアニメーションが表示される。また、画面中央上部から下にスワイプすると、新しい「検索または質問」インターフェースが表示される。これは、音声ではなくタイピングでAIを利用したいユーザーのための専用入り口であり、通知センターは画面左側から呼び出す方式に変更された。

      機能面では、Siriが初めてアプリを横断した複数ステップの指示に対応する。ユーザーは「明日の天気を調べて、午前10時から11時までの予定を作成し、母親に明日行くというメッセージを送って」と、すべてのリクエストを一つのプロンプトで完了させることができる。さらに、Siriは初めて独立したアプリとしても登場し、ChatGPTのようなチャットインターフェースを備え、履歴を保持した継続的な会話や、画像やファイルをアップロードしての分析も可能になる。

      さらに注目すべきは、基盤アーキテクチャの大変革だ。アップルは今回、フルスタック自社開発へのこだわりを捨て、グーグルの「Gemini」モデルをSiriの中核頭脳として採用した。The Informationの報道によると、新Siriのサービスの大部分はグーグルのクラウドサーバー上でホストされ、エヌビディア（Nvidia）のチップが使用されているという。ソフトウェアとハードウェアの統合、そしてプライバシーを長年重視してきたアップルにとって、これは間違いなく重大な戦略転換である。

      エコシステムの大開放：閉ざされた壁からAI配信プラットフォームへ

      Siri自体の再構築に加え、アップルはエコシステムの開放において、これまでにないほど大きな一歩を踏み出している。情報によると、iOS 27には「Extensions」と呼ばれる全く新しい基盤フレームワークが導入され、ユーザーは入力方式を切り替えるように、ChatGPTやClaudeといったサードパーティの大規模言語モデルを自由に利用できるようになる。

      これは、アップルインテリジェンスが、もはや自社モデルとChatGPTだけの「二人舞台」ではなくなることを意味する。アップルは自らをAIクエリの配信プラットフォームへと変貌させようとしている。ユーザーは文章作成をClaudeに任せ、プログラミングの問題をGeminiに処理させるといった選択が可能になり、その入り口は常に使い慣れたSiriであり続ける。この転換の背景には、EUのデジタル市場法（DMA）などの規制圧力もあるが、モデルの進化が極めて速い現代において、リスクを一つの選択肢に集中させないというアップル自身の保険でもある。

      クック氏のAI遺産と「技術的負債の返済」

      9月に会長職へ異動する予定のクック氏にとって、今回の発表会は強い別れの意味合いを帯びている。The Futurum Groupのダン・ニューマン（Dan Newman）CEOはCNBCに対し、アップルインテリジェンスはクック氏の任期中における「大きな汚点」であり、ハードウェアエンジニアリング責任者のジョン・ターナス（John Ternus）氏がCEOを引き継ぐ前に、AIの変曲点を引き起こす最後の機会だと指摘した。

      過去1年間、アップルのAIチームは混乱に見舞われた。8年間AIを統括してきたジョン・ジャナンドレア（John Giannandrea）氏が退任し、Siri責任者のロビー・ウォーカー（Robby Walker）氏もメタ（Meta）に引き抜かれた。差を埋めるため、アップルはグーグルと複数年にわたるAI提携契約を結ばざるを得なかった。ロイター通信によると、アップルはグーグルに対し、自社向けにカスタマイズされた1.2兆パラメータのGeminiモデルを使用するために、年間約10億ドル（約1,600億円）を支払うという。

      Siri以外にも、アップルインテリジェンスはシステム全体に浸透しつつある。カメラアプリには栄養成分表示や植物などの物体を認識する「ビジュアルインテリジェンス」が統合され、写真アプリにはAIによる画像拡張、再構図、そして大幅に改善された「消しゴム」機能が追加される。Safariブラウザは、AIがタブを自動整理する機能を獲得する。しかし、これらの機能の大部分は、中国のAndroidスマートフォンではすでに目新しいものではなく、アップルは「技術的負債」を返済しているに過ぎない。

      ウォール街の期待と懸念

      アップルの株価は過去1年間で53%も急騰し、市場全体を大きく上回った。市場は既に極めて高いAIへの期待をバリュエーションに織り込んでいる。モルガン・スタンレーは今回のWWDCを、アップルが「AI勝者」の称号を得られるかどうかを決める重要な一戦と位置づけている。

      バンク・オブ・アメリカのアナリスト、ワムシ・モハン（Wamsi Mohan）氏はリポートで、アップルがAIエージェント呼び出しの「料金所」になる可能性があると指摘する。同氏は、仮にウーバー（Uber）がSiriに配車リクエストを送信させたい場合、アップルに高額な手数料を支払わなければならなくなるかもしれないと例示した。これは、App Storeの手数料問題で長年デベロッパーとの関係が緊張してきたアップルにとって、新たな収入源を開拓する一方で、新たな摩擦を生む可能性もある。

      しかし、WWDCがすぐに株価を押し上げると見るアナリストばかりではない。UBSのアナリストは、新Siriが「ベータ版」または「プレビュー版」として発表される可能性が高く、ハードウェアのサプライズもないことから、WWDCが株価の「積極的なカタリスト」になるのは難しいと指摘する。MoffettNathansonのアナリスト、クレイグ・モフェット（Craig Moffett）氏は、より優れたSiriが、既にその成功を前提とした現在の超高バリュエーションを正当化できるかどうかこそが核心的な問題だと、鋭く指摘した。

      ハードウェアへの伏線：折りたたみ端末とタッチスクリーンMac

      WWDCはソフトウェアの祭典だが、今回のアップデートには将来のハードウェアへの伏線も埋め込まれている。iOS 27は、iPadのような「アプリの並列表示」というマルチタスクのウィンドウ処理機能を前例のない形で導入するが、これは明らかに、噂される折りたたみ式iPhoneに合わせてカスタマイズされたものだ。

      macOS 27はさらに急進的で、インテル（Intel）プロセッサを搭載したすべてのMacのサポートを完全に終了するだけでなく、タッチ操作対応モジュールを内蔵し、今年後半に発売予定の初のタッチスクリーン搭載MacBook Proに備える。これは、16年前にスティーブ・ジョブズ氏が「MacBookにタッチスクリーンは絶対に搭載しない」と述べた鉄則を、自ら覆すものだ。

      AIのローカル処理能力に対する需要が爆発的に高まる中、アップルは新たな融合アーキテクチャに基づく「M5 Ultra」チップも発表し、大規模言語モデルをローカルで実行する際のMacのコストパフォーマンス優位性をさらに強固にする見込みだ。

      ウォール・ストリート・ジャーナルが指摘するように、アップルは実際には良い手札を握っている。iPhoneは誰よりもユーザーを理解しており、数千億ドルを投じてAIモデルを構築する企業も、最終的にはアップルという入り口を通じて消費者にリーチせざるを得ないだろう。真にインテリジェントなSiriは、AI時代にアップルが新たな「課金の関所」を設けることを十分に可能にする。しかし、その前提は、Siriが本当に使い物になることだ。16年前に誕生した当初、人々はレストランの予約や使い走りができるインテリジェントエージェントを思い描いていたが、アップルによる買収後、そのビジョンが実現したことは一度もない。

      今回ばかりは、アップルに成果を出せない言い訳は通用しない。

      
