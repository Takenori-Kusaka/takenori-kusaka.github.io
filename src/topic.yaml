      1. 攻撃の完全時系列（勝木社長）
      約10日前（9月19日頃、正確な日時特定できず）
      → 攻撃者がグループ内某拠点のネットワーク機器を経由して初侵入

      その後10日間
      → 主に深夜・早朝・休日を利用して横移動・偵察を執拗に繰り返す
