    text: |
      新型宇宙ステーション補給機1号機（HTV-X1）に搭載した生鮮食品
      2025年（令和7年）10月31日

      国立研究開発法人宇宙航空研究開発機構

       10月26日に種子島宇宙センターから打ち上げ、30日に国際宇宙ステーション（ISS）に到着した新型宇宙ステーション補給機1号機（HTV-X1）によって、以下の生鮮食品をISSに長期滞在中の宇宙飛行士へ届けましたので、お知らせいたします。
       ISSに到着した模様を収めた動画・写真につきましては、後日公開を予定しております。

       生鮮食品は、2020年までISSへの物資補給を行ってきた「こうのとり」（HTV）と同じく、打上げ直前の物資搭載（レイトアクセス）によりHTV-X1に搭載しました。HTV-Xでは、「こうのとり」に比べて、レイトアクセスがより打上げ直前となるため、より新鮮な食品を搭載することが可能となりました。
       また、今回の生鮮食品搭載においては、将来の地球低軌道ビジネス等を見据えて、JAXAからの契約に基づき、請け負った団体が自らの責任において生鮮食品の調達（調達先の選定を含む）を行い、搭載に向けた準備を行うという、新たな取り組みを行いました。選ばれた生鮮食品は、当該団体によって除菌・梱包・輸送等の一連の業務が行われた後、種子島宇宙センターにてJAXAに引き渡されました。

      ©（公財）流通経済研究所（DEI）

      ■搭載生鮮食品
      品目	品種	産地（DEIによる調達先）
      りんご※1	ふじ	青森県（（株）ファーマインド）
      トマト	ドキア	福島県（（株）ワンダーファーム）
      和梨	王秋	千葉県（千葉県農林総合研究センター）
      新興	新潟県（Pear Japan（株））
      温州みかん※2	日南1号	福岡県（熊本大同青果（株））
      ※1： りんごの搭載はHTV6に続き2回目の搭載（ただし、産地は異なる）

      ※2： 温州みかんの搭載はHTV6～9号機に続き5回目の搭載（ただし、産地は異なる）

      参考： 新型宇宙ステーション補給機への搭載経緯等について

      1.
      新型宇宙ステーション補給機への生鮮食品搭載の目的
      ISS計画では、補給機を保有する国が分担してISSに長期滞在する宇宙飛行士に生鮮食品（果物及び野菜。以下同じ）を届けています。JAXAでは、国産生鮮食品を調達し、「こうのとり」に引き続き新型宇宙ステーション補給機でISSに輸送、宇宙飛行士に提供することにより、宇宙飛行士が抱える長期宇宙滞在による様々なストレスを緩和し、パフォーマンスの向上に繋げたいと考えています。
      また、併せて、“食”という身近なテーマを通じてISS／宇宙飛行士の活動を多くの人に身近な存在として認識いただくとともに、国産生鮮食品の輸送をアピールすることにより、ISSプログラムにおける日本のプレゼンスが向上することを期待しています。

      2.

      選定方法
      生鮮食品は、JAXAからの請負契約に基づき生鮮食品取扱業者（公益財団法人流通経済研究所）が、保存性や安全性等の技術的要件を満たした品目・品種・調達先の中から調達可能時期や打上げ時期に合わせて選定して搭載されました。

      ※搭載する生鮮食品の技術的要件

      調理性
      生食が可能なこと。
      保存性
      加工工場への集荷時点から種子島宇宙センターへの輸送、保管、HTV-X与圧モジュールの温度環境を模擬した環境において、4週間以上の保存が可能なこと。
      衛生性
      除菌後、一般生菌数が10,000CFU/g以下、かつ、真菌数（酵母・カビ数）が1,000CFU/g以下であること。
      安全性
      種子を食べる食品でないこと。
      喫食の際著しい果汁の飛散が無いこと。
      アレルギー等の表示対象食品でないこと。
      食品残渣
      喫食後の食品残渣が極力少ないこと。
      搭載量の制約
      規定のスペースに搭載可能であること。
      調達時期
      保存試験の実施を考慮し打上げ時期に調達が可能な食品であること。
      3.
      新型宇宙ステーション補給機1号機（HTV-X1）への搭載について
      搭載する生鮮食品は、生鮮食品加工工場に集荷され洗浄、除菌を行い、10月15日に種子島宇宙センターに納品されました。
      4週間の長期保存を達成するために、細菌やカビの発生を抑制する除菌や生鮮食品の呼吸をコントロールさせる包材を使っています。
      また、梱包を終えた生鮮食品は10月19日未明、レイトアクセスとして新型宇宙ステーション補給機1号機に搭載され、打ち上げられました。

      4.
      生鮮食品の選定、種子島までの輸送に関するお問い合わせ先
      （公財）流通経済研究所（DEI）担当部門（農業・地域振興部門）
      
