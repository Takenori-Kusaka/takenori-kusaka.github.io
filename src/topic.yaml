    text: |
      ひまわり９号の観測による画像等の提供再開について
      ～ひまわり９号の観測障害について（第５報）～
      報道発表日
      概要
      本文
      問合せ先
      資料全文
      報道発表日
      令和７年11月18日

      概要
      　11月26日14時から、「ひまわり９号」の観測による画像等の提供を再開します。

      本文
      　令和７年10月12日０時30分頃に障害が発生した静止気象衛星「ひまわり９号」について、現在は、気象庁において正常な観測データを取得できる状態に回復し、引き続き問題なく観測データを継続して受信しているところです。

      　このため、地上設備において配信設定変更等の切替作業を実施し、11月26日14時から「ひまわり９号」の観測による画像等の提供を再開します。ただし、顕著な気象現象が見込まれるなどの場合は、切替作業を延期することがありますので、その際には改めてお知らせします。

      　なお、障害の原因となった衛星内部で発生した通信異常については、調査を進めた結果、物理的な損傷によるものではないこと、また、関連機器を再起動することで問題なく復旧できる事象であることがわかりました。

      
